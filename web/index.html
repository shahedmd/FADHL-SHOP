<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FADHL E-Commerce">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fadhl">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>FADHL</title>
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">

  <meta name="theme-color" content="#0A1F13">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #FAFAFA;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: opacity 0.3s ease;
    }

    #loading-indicator.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(10, 31, 19, 0.12);
      border-top: 4px solid #0A1F13;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #0A1F13;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div id="loading-indicator">
    <div class="spinner"></div>
    <div class="loading-text">Loading FADHL...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-useful-frame', function () {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function () { loader.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

</body>

</html>
